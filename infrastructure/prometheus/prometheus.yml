global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert-rules.yml"

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "kafka-exporter"
    static_configs:
      - targets: ["kafka-exporter:9308"]
    metrics_path: /metrics
    scrape_interval: 15s

  - job_name: "kafka-ops-agent"
    static_configs:
      - targets: ["kafka-ops-agent:8207"]
    metrics_path: /metrics
    scrape_interval: 30s

  - job_name: "traffic-simulator"
    static_configs:
      - targets: ["traffic-simulator:8100"]
    metrics_path: /metrics
    scrape_interval: 15s

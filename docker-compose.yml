version: "3.9"

services:
  # ─── Infrastructure ─────────────────────────────────────────────────────────

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    hostname: zookeeper
    container_name: kafka_ops_zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - infrastructure
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    hostname: kafka
    container_name: kafka_ops_kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "9101:9101"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: "zookeeper:2181"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_JMX_PORT: 9101
      KAFKA_JMX_HOSTNAME: localhost
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_NUM_PARTITIONS: 3
    networks:
      - infrastructure
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10

  schema-registry:
    image: confluentinc/cp-schema-registry:7.5.0
    hostname: schema-registry
    container_name: kafka_ops_schema_registry
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: "kafka:29092"
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    networks:
      - infrastructure

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka_ops_kafka_ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:8081
      KAFKA_CLUSTERS_0_METRICS_PORT: 9101
    networks:
      - infrastructure

  kafka-exporter:
    image: danielqsj/kafka-exporter:latest
    container_name: kafka_ops_kafka_exporter
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "9308:9308"
    command:
      - "--kafka.server=kafka:29092"
      - "--web.listen-address=:9308"
    networks:
      - infrastructure
      - monitoring
    restart: unless-stopped

  kafka-topic-creator:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka_ops_topic_creator
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./infrastructure/kafka/topics.json:/topics.json
      - ./infrastructure/kafka/create-topics.sh:/create-topics.sh
    command: bash /create-topics.sh
    networks:
      - infrastructure
    restart: on-failure

  qdrant:
    image: qdrant/qdrant:latest
    container_name: kafka_ops_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    networks:
      - infrastructure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:15-alpine
    container_name: kafka_ops_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: kafka_ops
      POSTGRES_USER: ${POSTGRES_USER:-kafka_ops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kafka_ops_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - infrastructure
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kafka_ops}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: kafka_ops_redis
    ports:
      - "6379:6379"
    networks:
      - infrastructure
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Monitoring ─────────────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:latest
    container_name: kafka_ops_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./infrastructure/prometheus/alert-rules.yml:/etc/prometheus/alert-rules.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--web.enable-lifecycle"
    networks:
      - monitoring
      - infrastructure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:latest
    container_name: kafka_ops_grafana
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/grafana/datasources:/etc/grafana/provisioning/datasources
      - ./infrastructure/grafana/dashboards:/etc/grafana/provisioning/dashboards
    networks:
      - monitoring

  # ─── Simulation ─────────────────────────────────────────────────────────────

  traffic-simulator:
    build:
      context: ./simulation/traffic-simulator
      dockerfile: Dockerfile
    container_name: kafka_ops_traffic_simulator
    depends_on:
      kafka-topic-creator:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SIMULATION_TOPICS: orders,payments,inventory,user-events,notifications
      PRODUCE_RATE_PER_SECOND: "200"
      LOG_LEVEL: INFO
    networks:
      - infrastructure
      - simulation
    restart: unless-stopped

  failure-injector:
    build:
      context: ./simulation/failure-injector
      dockerfile: Dockerfile
    container_name: kafka_ops_failure_injector
    depends_on:
      traffic-simulator:
        condition: service_started
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      FAILURE_INTERVAL_SECONDS: "120"
      LOG_LEVEL: INFO
    networks:
      - infrastructure
      - simulation
    restart: unless-stopped

  # ─── Knowledge ──────────────────────────────────────────────────────────────

  knowledge-seeder:
    build:
      context: ./knowledge/seeder
      dockerfile: Dockerfile
    container_name: kafka_ops_knowledge_seeder
    depends_on:
      qdrant:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: kafka_ops
      POSTGRES_USER: ${POSTGRES_USER:-kafka_ops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kafka_ops_secret}
      RUNBOOKS_PATH: /knowledge/runbooks
      INCIDENTS_PATH: /knowledge/incidents
    volumes:
      - ./knowledge/runbooks:/knowledge/runbooks
      - ./knowledge/incidents:/knowledge/incidents
    networks:
      - infrastructure
    restart: on-failure

  # ─── Agent ──────────────────────────────────────────────────────────────────

  kafka-ops-agent:
    build:
      context: .
      dockerfile: agents/kafka_ops/Dockerfile
    container_name: kafka_ops_agent
    depends_on:
      kafka-topic-creator:
        condition: service_completed_successfully
      qdrant:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      knowledge-seeder:
        condition: service_completed_successfully
    ports:
      - "8207:8207"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: kafka_ops
      POSTGRES_USER: ${POSTGRES_USER:-kafka_ops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kafka_ops_secret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      LAG_POLL_INTERVAL_SECONDS: "60"
      PARTITION_SCAN_INTERVAL_SECONDS: "300"
      CONFIG_SNAPSHOT_INTERVAL_SECONDS: "21600"
      LAG_WARNING_SCORE: "0.4"
      LAG_CRITICAL_SCORE: "0.7"
      LOG_LEVEL: INFO
      PORT: 8207
    networks:
      - infrastructure
      - agents
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8207/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ─── API ────────────────────────────────────────────────────────────────────

  kafka-ops-api:
    build:
      context: ./application/kafka-ops-api
      dockerfile: Dockerfile
    container_name: kafka_ops_api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: kafka_ops
      POSTGRES_USER: ${POSTGRES_USER:-kafka_ops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kafka_ops_secret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      LOG_LEVEL: INFO
    networks:
      - infrastructure
      - agents
    restart: unless-stopped

networks:
  infrastructure:
    driver: bridge
  monitoring:
    driver: bridge
  simulation:
    driver: bridge
  agents:
    driver: bridge

volumes:
  qdrant_storage:
  postgres_data:
  prometheus_data:
  grafana_data:
